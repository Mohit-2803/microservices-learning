# ============================================================================
#  nginx.conf  —  Milestone 6 + HTTPS/TLS
#  nginx now terminates TLS: clients connect over HTTPS, nginx decrypts, and
#  talks plain HTTP to the backends on the private network.
#    :80  -> redirect everything to HTTPS
#    :443 -> the real, encrypted server (load balancing + rate limit + auth)
# ============================================================================

worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format lb '$remote_addr "$request" $status  upstream=$upstream_addr';
    access_log /var/log/nginx/access.log lb;

    # Docker's embedded DNS — lets nginx re-resolve names used via a variable.
    resolver 127.0.0.11 valid=10s;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # Two products replicas, round-robin (load balancing).
    upstream products_backend {
        server products-svc-1:3000;
        server products-svc-2:3000;
    }

    # Rate-limit zone for the login endpoint (anti brute-force).
    limit_req_zone $binary_remote_addr zone=login_zone:10m rate=10r/m;
    limit_req_status 429;

    # ===== RESPONSE CACHE ===================================================
    # A disk cache for backend responses.
    #   /var/cache/nginx/products    = where cached bodies are stored
    #   levels=1:2                   = how cache files are nested (perf detail)
    #   keys_zone=products_cache:10m = 10MB shared-memory index of cache keys
    #   max_size=100m                = cap on-disk cache at 100MB
    #   inactive=60s                 = evict entries not requested for 60s
    proxy_cache_path /var/cache/nginx/products levels=1:2
                     keys_zone=products_cache:10m max_size=100m inactive=60s;

    # ========================================================================
    #  HTTP (port 80)  ->  redirect everything to HTTPS
    # ========================================================================
    server {
        listen 80;
        server_name localhost;

        # Local dev uses non-standard ports, so we name the HTTPS port (8443)
        # explicitly. In production (standard 443) you'd just use:
        #     return 301 https://$host$request_uri;
        return 301 https://localhost:8443$request_uri;
    }

    # ========================================================================
    #  HTTPS (port 443)  ->  the real server
    # ========================================================================
    server {
        listen 443 ssl;
        server_name localhost;

        # The certificate (public) and private key, mounted from ./nginx/certs.
        ssl_certificate     /etc/nginx/certs/shop.crt;
        ssl_certificate_key /etc/nginx/certs/shop.key;

        # Reasonable modern defaults.
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;

        # ---- /api/auth/ -> auth-svc  (RATE LIMITED + RESOLVER TRICK) --------
        location /api/auth/ {
            limit_req zone=login_zone burst=5 nodelay;
            # variable + rewrite => nginx re-resolves auth-svc per request,
            # so it self-heals if auth-svc is recreated (no 502, no restart).
            set $auth auth-svc;
            rewrite ^/api/auth/(.*)$ /$1 break;
            proxy_pass http://$auth:3000;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ---- /api/products/ -> products pool  (LOAD BALANCED + CACHED) ------
        location /api/products/ {
            # Use the cache zone. Cache 200 OK responses for 30 seconds; a 2nd
            # identical request within that window is served from nginx's cache
            # and never touches a backend or the database.
            proxy_cache products_cache;
            proxy_cache_valid 200 30s;

            # Expose whether each response was a cache HIT or MISS so you can
            # SEE it working. Watch this header in the demo below.
            add_header X-Cache-Status $upstream_cache_status always;

            proxy_pass http://products_backend/;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ---- /api/orders/ -> orders-svc  (RESOLVER TRICK) -------------------
        location /api/orders/ {
            set $orders orders-svc;
            rewrite ^/api/orders/(.*)$ /$1 break;
            proxy_pass http://$orders:3000;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ---- everything else -> the Next.js frontend  (RESOLVER TRICK) ------
        location / {
            # variable forces per-request resolution. $request_uri passes the
            # full original path (this is the catch-all, so nothing to strip).
            set $frontend frontend-svc;
            proxy_pass http://$frontend:3000$request_uri;
            proxy_http_version 1.1;
            proxy_set_header Upgrade           $http_upgrade;
            proxy_set_header Connection        $connection_upgrade;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
