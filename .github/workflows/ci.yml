# ============================================================================
#  .github/workflows/ci.yml
#  A CI pipeline that runs AUTOMATICALLY on GitHub whenever you push or open a
#  pull request. GitHub gives each job a fresh, clean Linux VM (a "runner").
#
#  Two jobs:
#    1) unit-tests  — fast: run payments-svc's unit tests
#    2) integration — build the images, start the whole stack, smoke-test it
#       (only runs if unit-tests passed)
# ============================================================================
name: CI

# WHEN does this pipeline run? (the triggers)
on:
  push:
  pull_request:

jobs:
  # ---- JOB 1: fast unit tests ---------------------------------------------
  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest                 # the fresh VM GitHub gives us
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4           # a prebuilt action: clones your code

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install deps & run payments-svc tests
        working-directory: services/payments-svc
        run: |
          npm install
          npm test

  # ---- JOB 2: build images + smoke-test the whole stack -------------------
  integration:
    name: Build & smoke test
    runs-on: ubuntu-latest
    needs: unit-tests                       # waits for job 1; skips if it failed
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      # The runner is a CLEAN machine — gitignored files (.env, TLS certs) are
      # NOT here. The pipeline must recreate them. This is exactly why we keep
      # a committed .env.example template.
      - name: Create .env from the template
        run: cp .env.example .env

      - name: Generate a self-signed TLS cert (nginx won't start without it)
        run: |
          mkdir -p nginx/certs
          openssl req -x509 -nodes -days 365 -newkey rsa:2048 \
            -keyout nginx/certs/shop.key \
            -out  nginx/certs/shop.crt \
            -subj "/CN=localhost"

      - name: Build all images
        run: docker compose build

      - name: Start the stack
        run: docker compose up -d

      - name: Wait for services to come up
        run: sleep 25

      - name: Smoke test — products via the gateway (HTTPS, self-signed)
        run: |
          curl -fksS https://localhost:8443/api/products/ | grep -q "Mechanical Keyboard"
          echo "✅ gateway + products-svc + products-db are all working together"

      - name: Show container logs if the smoke test failed
        if: failure()
        run: docker compose logs

      - name: Tear everything down
        if: always()                        # run even if a step above failed
        run: docker compose down -v

  # ---- JOB 3: publish ALL service images to GHCR (CD) ----------------------
  #  Jobs 1-2 were CI: they proved the code works. This is CD: it produces
  #  shippable ARTIFACTS. For a Docker project those are container IMAGES, and
  #  we publish them to a REGISTRY (GitHub's own, ghcr.io) so any machine can
  #  `pull` the exact same bytes instead of rebuilding.
  #
  #  Instead of copy-pasting this job once per service, we use a MATRIX: GitHub
  #  runs the SAME job once per list entry below, all in PARALLEL, swapping in
  #  that entry's values. Add a service = add one line to the matrix.
  #  (hello-svc is the legacy, unwired demo — intentionally NOT published.)
  publish:
    name: Publish ${{ matrix.name }} image     # the UI shows one job per service
    runs-on: ubuntu-latest
    needs: integration                      # only ship if tests + smoke test passed

    # Only publish on a real push to main. We do NOT publish on pull requests
    # or feature branches — you don't want every experiment (or a PR from a
    # fork) pushing images to your registry.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    # Least privilege: each run gets an auto-generated GITHUB_TOKEN. By default
    # it canNOT write packages, so we explicitly grant just that one permission.
    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false                      # one service failing won't cancel the others
      matrix:
        # Each entry needs a NAME (becomes the image name) and a build CONTEXT
        # (the folder holding that service's Dockerfile). They differ: services
        # live under services/, but the frontend is at the repo root.
        include:
          - { name: auth-svc,     context: services/auth-svc }
          - { name: products-svc, context: services/products-svc }
          - { name: orders-svc,   context: services/orders-svc }
          - { name: payments-svc, context: services/payments-svc }
          - { name: frontend,     context: frontend }

    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      # Log in to GHCR. This action is just a wrapper around `docker login
      # ghcr.io`: the username is whoever/whatever triggered the run, and the
      # password is the temporary GITHUB_TOKEN (no secret for you to manage).
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # GHCR image names must be ALL lowercase, but your owner is "Mohit-2803"
      # (capital M) — a raw ghcr.io/Mohit-2803/... is an INVALID reference and
      # docker would reject it. So we lowercase the owner and build the full
      # image name for THIS matrix entry: ghcr.io/<owner>/<matrix.name>
      - name: Work out the (lowercase) image name
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "IMAGE=ghcr.io/$OWNER/${{ matrix.name }}" >> "$GITHUB_ENV"

      # Build this service's image and tag it TWICE:
      #   :latest          — a moving label, always the newest push to main
      #   :<full git SHA>  — an immutable, unique handle for THIS exact commit
      # We push both. :latest is convenient; the SHA tag is what lets you say
      # "deploy/roll back to exactly that commit's image". (github.sha is the
      # 40-char commit hash GitHub injects for this run.)
      - name: Build & push the image
        run: |
          docker build \
            -t "$IMAGE:latest" \
            -t "$IMAGE:${{ github.sha }}" \
            ${{ matrix.context }}
          docker push "$IMAGE:latest"
          docker push "$IMAGE:${{ github.sha }}"
          echo "✅ pushed $IMAGE:latest and $IMAGE:${{ github.sha }}"
